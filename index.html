<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0F2B1E"/>
<title>Parqueadero El Meridiam – Le Meridiem Golf</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A1F15;font-family:'Outfit','Segoe UI',sans-serif;color:#F5F0E6;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;min-height:100vh;background:linear-gradient(175deg,#0F2B1E 0%,#0A1F15 100%)}
.screen{width:100%;max-width:440px;padding:32px 20px;display:flex;flex-direction:column;align-items:center}
.card{background:linear-gradient(145deg,#1A4230,#163828);border-radius:20px;padding:28px 22px;width:100%;border:1px solid rgba(201,169,110,0.15);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.logo-wrap{width:80px;height:80px;border-radius:50%;border:2.5px solid #C9A96E;display:flex;align-items:center;justify-content:center;background:#0F2B1E;margin:0 auto 20px}
.logo-sm{width:46px;height:46px;border-radius:50%;border:2px solid #C9A96E;display:flex;align-items:center;justify-content:center;background:#0F2B1E;flex-shrink:0}
.logo-xs{width:38px;height:38px;border-radius:50%;border:1.5px solid #C9A96E;display:flex;align-items:center;justify-content:center;background:#0F2B1E;flex-shrink:0}
svg path,svg circle{stroke:#C9A96E}
.title{font-size:20px;font-weight:800;color:#E8D5A8;margin-bottom:2px;text-align:center}
.subtitle{font-size:13px;color:#8A9B93;text-align:center;margin-bottom:4px}
.park-title{font-size:15px;font-weight:700;color:#F5F0E6;text-align:center;margin-bottom:28px}
label.lbl{display:block;font-size:13px;color:#C9A96E;font-weight:700;margin-bottom:7px}
input.inp{background:rgba(255,255,255,0.08);border:1.5px solid rgba(201,169,110,0.35);border-radius:10px;padding:14px 16px;font-size:16px;color:#F5F0E6;width:100%;font-family:inherit;outline:none}
input.inp:focus{border-color:#C9A96E}
input.inp.plate-inp{text-align:center;font-size:24px;font-weight:800;letter-spacing:4px;text-transform:uppercase}
.btn-primary{background:linear-gradient(135deg,#C9A96E,#B8943F);color:#0F2B1E;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;letter-spacing:.3px;transition:opacity .2s}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-secondary{background:transparent;color:#C9A96E;border:1.5px solid #C9A96E;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:10px}
.btn-back{background:rgba(255,255,255,0.06);color:#8A9B93;border:1px solid rgba(201,169,110,0.15);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:18px;display:inline-flex;align-items:center;gap:5px}
.row{display:flex;gap:10px}
.half{flex:1}
.kpi{border-radius:12px;padding:14px;text-align:center}
.kpi-label{font-size:11px;color:#8A9B93;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:800}
.tariff-table{border-radius:10px;overflow:hidden;border:1px solid rgba(201,169,110,0.15);margin-bottom:10px}
.tariff-head{display:grid;grid-template-columns:1fr 1fr 1fr;background:rgba(201,169,110,0.15);padding:8px 10px}
.tariff-head span,.tariff-row span{font-size:10px;font-weight:700;color:#C9A96E}
.tariff-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:7px 10px;border-top:1px solid rgba(201,169,110,0.08)}
.tariff-row span{font-size:11px;color:#F5F0E6;font-weight:400}
.tariff-row span:nth-child(2){text-align:center}
.tariff-row span:nth-child(3){text-align:right}
.tariff-row.active{background:rgba(46,204,113,0.13)}
.tariff-row.active span{color:#2ECC71}
.toggle-box{background:rgba(201,169,110,0.08);border-radius:10px;padding:11px 14px;margin-bottom:10px;cursor:pointer}
.toggle-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#E8D5A8;font-weight:700}
.toggle-body{margin-top:10px;font-size:11px;color:#8A9B93;line-height:1.7}
.divider{height:1px;background:rgba(201,169,110,0.15);margin:18px 0}
.badge{display:inline-block;background:rgba(201,169,110,0.15);border-radius:20px;padding:5px 14px;font-size:12px;color:#C9A96E;font-weight:700}
.warn-box{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:#E8A09A;margin-bottom:16px}
.info-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:11px 14px;font-size:11px;color:#8A9B93;line-height:1.65;margin-bottom:14px}
.success-circle{width:74px;height:74px;border-radius:50%;background:rgba(46,204,113,0.15);border:2px solid #2ECC71;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:36px}
.fail-circle{width:74px;height:74px;border-radius:50%;background:rgba(231,76,60,0.15);border:2px solid #E74C3C;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:36px}
.thank-card{background:linear-gradient(135deg,rgba(201,169,110,0.13),rgba(201,169,110,0.05));border-radius:16px;padding:20px 18px;margin-bottom:16px;border:1px solid rgba(201,169,110,0.2);text-align:center}
.reason-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0}
.reason-btn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px;border-radius:14px;border:2px solid rgba(201,169,110,0.15);background:rgba(255,255,255,0.04);cursor:pointer;font-family:inherit;transition:all .15s}
.reason-btn.sel{border-color:#C9A96E;background:rgba(201,169,110,0.15)}
.reason-btn .icon{font-size:28px}
.reason-btn .rlbl{font-size:12px;color:#8A9B93;font-weight:500;text-align:center}
.reason-btn.sel .rlbl{color:#E8D5A8;font-weight:700}
.method-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.15);border-radius:12px;cursor:pointer;font-family:inherit;color:#F5F0E6;font-size:15px;font-weight:600;width:100%;margin-bottom:10px;transition:background .15s}
.method-btn:hover{background:rgba(201,169,110,0.1)}
.method-icon{font-size:24px}
.invoice{background:#F5F0E6;color:#0F2B1E;border-radius:20px;padding:24px;width:100%}
.inv-row{display:flex;justify-content:space-between;font-size:13px;line-height:2.2;color:#3A5044}
.inv-total{display:flex;justify-content:space-between;font-size:17px;font-weight:800;color:#0F2B1E}
.inv-divider{height:1px;background:#D4C9B0;margin:12px 0}
.tab-sel{background:rgba(201,169,110,0.15);border-color:#C9A96E !important;color:#E8D5A8 !important}
.check-row{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:#F5F0E6;line-height:1.6}
.check-row input{accent-color:#C9A96E;margin-top:3px;flex-shrink:0}
.gold-link{color:#C9A96E;cursor:pointer;text-decoration:underline}
.ally-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid rgba(201,169,110,0.1)}
.payment-meta{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;margin-top:16px}
.pm-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinner{width:64px;height:64px;border-radius:50%;border:3px solid rgba(201,169,110,0.2);border-top-color:#C9A96E;margin:0 auto 22px;animation:spin 1s linear infinite}
.hidden{display:none}
.mt10{margin-top:10px}
.mt14{margin-top:14px}
.mb10{margin-bottom:10px}
.mb14{margin-bottom:14px}
.mb20{margin-bottom:20px}
.center{text-align:center}
.g-text{color:#2ECC71}
.gold-text{color:#C9A96E}
.gray-text{color:#8A9B93}
.cream-text{color:#F5F0E6}
.red-text{color:#E74C3C}
.gold-lt{color:#E8D5A8}
.header-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.vehicle-img{background:rgba(0,0,0,0.3);border-radius:14px;height:155px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;border:1px dashed rgba(201,169,110,0.2);position:relative;overflow:hidden}
.plate-bar{position:absolute;bottom:0;left:0;right:0;padding:8px 14px;background:rgba(15,43,30,0.92);display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ── STATE ────────────────────────────────
const S = {
  screen: 'plate',
  plate: '',
  user: null,
  amount: 0,
  method: '',
  visitReason: '',
  visitIcon: '',
  adminTaps: 0,
  adminTimer: null,
};

const USERS = {
  'ABC123': { name:'Carlos Rodríguez', email:'carlos@email.com', phone:'3001234567', entryMs: Date.now()-2.5*3600000 },
  'XYZ789': { name:'María López',      email:'maria@email.com',  phone:'3109876543', entryMs: Date.now()-1.2*3600000 },
};

const REASONS = [
  {id:'restaurant',label:'Restaurante',icon:'🍽️'},
  {id:'shopping',  label:'Compras',    icon:'🛍️'},
  {id:'entertain', label:'Entretenimiento',icon:'🎭'},
  {id:'sport',     label:'Deporte',    icon:'⚽'},
  {id:'market',    label:'Mercado',    icon:'🛒'},
  {id:'other',     label:'Otro',       icon:'✨'},
];

const TARIFFS = [
  {range:'0 – 1 hora',   rate:'GRATIS',   acc:'$0'},
  {range:'1 – 2 horas',  rate:'$3.000',   acc:'$3.000'},
  {range:'2 – 3 horas',  rate:'$2.000',   acc:'$5.000'},
  {range:'3 – 4 horas',  rate:'$1.800',   acc:'$6.800'},
  {range:'4 – 5 horas',  rate:'$1.700',   acc:'$8.500'},
  {range:'5 – 6 horas',  rate:'$1.500',   acc:'$10.000'},
  {range:'6 – 12 horas', rate:'INCLUIDO', acc:'$10.000'},
];

function calcParking(entryMs){
  const hrs=(Date.now()-entryMs)/3600000;
  const totalMin=Math.floor((Date.now()-entryMs)/60000);
  const h=Math.floor(totalMin/60), m=totalMin%60;
  const amount=hrs<=1?0:hrs<=2?3000:hrs<=3?5000:hrs<=4?6800:hrs<=5?8500:10000;
  const next=hrs<=1?Math.ceil((1-hrs)*60):hrs<=2?Math.ceil((2-hrs)*60):hrs<=3?Math.ceil((3-hrs)*60):hrs<=4?Math.ceil((4-hrs)*60):hrs<=5?Math.ceil((5-hrs)*60):0;
  const entry=new Date(entryMs).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  return {hrs,h,m,amount,next,entry};
}
function fCOP(n){return '$'+n.toLocaleString('es-CO');}
function activeTariff(hrs){
  if(hrs<=1)return 0; if(hrs<=2)return 1; if(hrs<=3)return 2;
  if(hrs<=4)return 3; if(hrs<=5)return 4; if(hrs<=6)return 5; return 6;
}

// ── LOGO SVG ─────────────────────────────
function logoSVG(size){
  const h=size||44;
  return `<svg width="${h*.48}" height="${h*.48}" viewBox="0 0 40 40" fill="none">
    <path d="M8 32V8L20 20L32 8V32" stroke="#C9A96E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="10" r="3" fill="#C9A96E"/>
  </svg>`;
}

// ── RENDER ───────────────────────────────
function go(screen){ S.screen=screen; render(); }
function render(){ document.getElementById('app').innerHTML = screens[S.screen](); bindEvents(); }

// ── SCREENS ──────────────────────────────
const screens = {

plate(){ return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card" style="text-align:center">
  <div class="logo-wrap">${logoSVG(80)}</div>
  <div class="title">Le Meridiem Golf</div>
  <div class="subtitle">Centro Comercial</div>
  <div class="park-title">Parqueadero El Meridiam</div>
  <label class="lbl" style="text-align:left">Placa del vehículo</label>
  <input class="inp plate-inp mb20" id="plateIn" placeholder="ABC 123" maxlength="7" autocomplete="off"/>
  <button class="btn-primary" id="btnPlate">Consultar</button>
  <p class="gray-text mt10" style="font-size:12px">Ingrese la placa para consultar su estado y realizar el pago.</p>
</div></div>`;},

register(){ return `
<div class="screen">
<div class="card">
  <button class="btn-back" id="btnBack">← Volver</button>
  <div class="header-row">
    <div class="logo-sm">${logoSVG(46)}</div>
    <div><div class="title" style="font-size:17px;text-align:left">Registro de usuario</div>
    <div class="gray-text" style="font-size:13px">Placa: <strong class="gold-lt">${S.plate}</strong></div></div>
  </div>
  <label class="lbl">Nombre completo</label>
  <input class="inp mb14" id="regName" placeholder="Ej: Juan Pérez"/>
  <label class="lbl">Recibir factura por</label>
  <div class="row mb14">
    <button class="method-btn half ${S._regMethod!=='sms'?'tab-sel':''}" style="margin:0" id="mEmail">📧 Correo</button>
    <button class="method-btn half ${S._regMethod==='sms'?'tab-sel':''}" style="margin:0" id="mSMS">📱 SMS</button>
  </div>
  <div id="emailField" class="${S._regMethod==='sms'?'hidden':''}">
    <label class="lbl">Correo electrónico</label>
    <input class="inp mb14" id="regEmail" type="email" placeholder="correo@ejemplo.com"/>
  </div>
  <div id="smsField" class="${S._regMethod==='sms'?'':'hidden'}">
    <label class="lbl">Celular</label>
    <input class="inp mb14" id="regPhone" type="tel" placeholder="300 123 4567"/>
  </div>
  <div class="toggle-box mb14">
    <label class="check-row">
      <input type="checkbox" id="chkData"/>
      <span>Autorizo el tratamiento de mis datos conforme a la <span class="gold-link" id="showPol">Política de Datos Personales</span> de Le Meridiem Golf (Ley 1581 de 2012).</span>
    </label>
    <div class="toggle-body hidden" id="polText">En cumplimiento de la Ley 1581 de 2012, sus datos serán usados exclusivamente para gestión del parqueadero y facturación. No serán compartidos con terceros sin autorización expresa.</div>
  </div>
  <label class="check-row mb20"><input type="checkbox" id="chkPromo"/><span>Deseo recibir promociones de Le Meridiem Golf (opcional).</span></label>
  <button class="btn-primary" id="btnRegister" disabled>Registrarme y continuar</button>
</div></div>`;},

welcome(){ return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card" style="text-align:center">
  <div style="display:flex;justify-content:flex-start"><button class="btn-back" id="btnBack">← Volver</button></div>
  <div class="logo-wrap">${logoSVG(80)}</div>
  <div class="gray-text mb10">Bienvenido de nuevo</div>
  <div style="font-size:26px;font-weight:800;color:#E8D5A8;margin-bottom:8px">${S.user.name}</div>
  <div class="gray-text mb20">Placa: <strong class="cream-text">${S.plate}</strong></div>
  <button class="btn-primary mb10" id="btnContinue">Continuar</button>
  <button class="btn-secondary" id="btnUpdate">Actualizar mis datos</button>
</div></div>`;},

vehicle(){
  const info=calcParking(S.user.entryMs||S.user.entryTime);
  const ai=activeTariff(info.hrs);
  const rows=TARIFFS.map((t,i)=>`
    <div class="tariff-row${i===ai?' active':''}">
      <span>${t.range}</span><span>${t.rate}</span><span>${t.acc}</span>
    </div>`).join('');
  const nearWarn=info.next>0&&info.next<=15&&info.amount<10000?`
    <div class="warn-box" style="display:flex;gap:8px;align-items:center">
      <span>⏰</span><span>Le faltan <strong style="color:#E74C3C">${info.next} min</strong> para la siguiente tarifa.</span>
    </div>`:'';
  return `
<div class="screen">
<div class="card" style="padding:20px 16px">
  <button class="btn-back" id="btnBack">← Volver</button>
  <div class="vehicle-img">
    <div style="text-align:center"><div style="font-size:48px">🚗</div><div class="gray-text" style="font-size:12px">Imagen del vehículo (cámara LPR)</div></div>
    <div class="plate-bar">
      <span style="color:#E8D5A8;font-weight:800;font-size:18px;letter-spacing:3px">${S.plate}</span>
      <span class="gray-text" style="font-size:12px">Entrada: ${info.entry}</span>
    </div>
  </div>
  <div class="row mb14">
    <div class="kpi half" style="background:rgba(201,169,110,0.08)">
      <div class="kpi-label">Tiempo</div>
      <div class="kpi-val cream-text">${info.h}h ${info.m}m</div>
    </div>
    <div class="kpi half" style="background:rgba(46,204,113,0.1)">
      <div class="kpi-label">A pagar</div>
      <div class="kpi-val g-text">${fCOP(info.amount)}</div>
    </div>
  </div>
  ${nearWarn}
  <div style="font-size:13px;font-weight:700;color:#E8D5A8;margin-bottom:8px">Tarifas del Parqueadero</div>
  <div class="tariff-table">
    <div class="tariff-head"><span>FRANJA</span><span style="text-align:center">TARIFA</span><span style="text-align:right">ACUMULADO</span></div>
    ${rows}
  </div>
  <p class="gray-text mb14" style="font-size:10px;text-align:center;font-style:italic">Máximo a pagar: $10.000. Jornada hasta 12 horas.</p>
  <div class="toggle-box mb10" id="toggleAllies">
    <div class="toggle-header"><span>🏪 Locales con convenio de parqueadero</span><span id="alliesArrow">▼</span></div>
    <div class="toggle-body hidden" id="alliesBody">
      <div class="ally-row"><div><div style="font-size:12px;color:#F5F0E6;font-weight:600">Restaurante La Terraza</div><div style="font-size:11px">Mín: $30.000</div></div><span class="g-text" style="font-size:12px;font-weight:700">1h gratis</span></div>
      <div class="ally-row"><div><div style="font-size:12px;color:#F5F0E6;font-weight:600">Restaurante Il Forno</div><div style="font-size:11px">Mín: $50.000</div></div><span class="g-text" style="font-size:12px;font-weight:700">2h gratis</span></div>
      <div class="ally-row"><div><div style="font-size:12px;color:#F5F0E6;font-weight:600">Café del Parque</div><div style="font-size:11px">Mín: $15.000</div></div><span class="g-text" style="font-size:12px;font-weight:700">30 min gratis</span></div>
    </div>
  </div>
  <div class="center mb14" id="togglePol" style="cursor:pointer"><span class="gold-link" style="font-size:12px">Ver políticas del parqueadero</span></div>
  <div class="toggle-body hidden mb14" id="polBody">• Primera hora sin costo.<br/>• Techo: $10.000/día (12h).<br/>• Tiene 15 min para retirar el vehículo tras el pago.<br/>• Velocidad máx: 10 km/h.</div>
  <button class="btn-primary" id="btnPay">Continuar con el pago</button>
</div></div>`;},

reason(){ return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card">
  <button class="btn-back" id="btnBack">← Volver</button>
  <div class="header-row">
    <div class="logo-sm">${logoSVG(46)}</div>
    <div><div class="title" style="font-size:17px;text-align:left">¿Motivo de su visita?</div>
    <div class="gray-text" style="font-size:13px">Nos ayuda a mejorar su experiencia</div></div>
  </div>
  <div class="reason-grid">
    ${REASONS.map(r=>`<button class="reason-btn" id="r_${r.id}" data-id="${r.id}" data-label="${r.label}" data-icon="${r.icon}">
      <span class="icon">${r.icon}</span><span class="rlbl">${r.label}</span>
    </button>`).join('')}
  </div>
  <div id="otherWrap" class="hidden mb14">
    <label class="lbl">¿Cuál fue el motivo?</label>
    <input class="inp" id="otherText" placeholder="Indíquenos brevemente…"/>
  </div>
  <div class="info-box">🔒 Respuesta voluntaria y confidencial. Datos tratados con fines estadísticos conforme a la <span class="gold-text">Política de Datos Personales de Le Meridiem Golf (Ley 1581 de 2012)</span>.</div>
  <button class="btn-primary" id="btnReason" disabled>Continuar</button>
</div></div>`;},

payment(){ return `
<div class="screen">
<div class="card">
  <button class="btn-back" id="btnBack">← Volver</button>
  <div class="header-row">
    <div class="logo-sm">${logoSVG(46)}</div>
    <div><div class="title" style="font-size:17px;text-align:left">Método de pago</div>
    <div class="gray-text" style="font-size:13px">Total: <strong class="g-text">${fCOP(S.amount)}</strong></div></div>
  </div>
  <button class="method-btn" id="m_nequi"><span class="method-icon">📱</span>Nequi</button>
  <button class="method-btn" id="m_daviplata"><span class="method-icon">🔴</span>Daviplata</button>
  <button class="method-btn" id="m_pse"><span class="method-icon">🏦</span>PSE</button>
  <button class="method-btn" id="m_tarjeta"><span class="method-icon">💳</span>Tarjeta crédito/débito</button>
  <div style="background:rgba(201,169,110,0.08);border-radius:12px;padding:16px">
    <div style="font-size:13px;color:#E8D5A8;font-weight:700;margin-bottom:10px">💵 Pago en efectivo o tarjeta física</div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px"><span style="font-size:20px">📍</span><div><div style="font-size:12px;color:#F5F0E6;font-weight:600">Módulo Piso 1 – Entrada Principal</div><div style="font-size:11px;color:#8A9B93">Junto a la recepción</div></div></div>
    <div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">📍</span><div><div style="font-size:12px;color:#F5F0E6;font-weight:600">Módulo Piso 2 – Zona Restaurantes</div><div style="font-size:11px;color:#8A9B93">Frente al ascensor central</div></div></div>
  </div>
</div></div>`;},

processing(){ 
  setTimeout(()=>{ Math.random()>0.1?go('thanks'):go('failed'); },3000);
  return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card" style="text-align:center">
  <div class="spinner"></div>
  <div class="title" style="font-size:18px;margin-bottom:6px">Procesando pago...</div>
  <div class="gray-text mb20">No cierre esta ventana</div>
  <div class="payment-meta">
    <div class="pm-row"><span class="gray-text">Método</span><span class="cream-text" style="font-weight:600;text-transform:capitalize">${S.method}</span></div>
    <div class="pm-row"><span class="gray-text">A nombre de</span><span class="cream-text" style="font-weight:600">${S.user.name}</span></div>
    <div class="divider" style="margin:8px 0"></div>
    <div class="pm-row" style="font-size:15px;font-weight:700"><span class="gold-text">Total</span><span class="g-text">${fCOP(S.amount)}</span></div>
  </div>
</div></div>`;},

thanks(){
  const h=new Date().getHours();
  const gr=h<12?'¡Buen provecho y':h<18?'¡Buenas tardes y':'¡Buenas noches y';
  return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card" style="text-align:center">
  <div class="success-circle">✓</div>
  <div style="font-size:22px;font-weight:800;color:#2ECC71;margin-bottom:6px">¡Pago exitoso!</div>
  <div class="cream-text mb20" style="font-size:14px">Factura enviada a <strong>${S.user.email||S.user.phone}</strong></div>
  <div class="divider"></div>
  <div class="thank-card">
    <div style="font-size:38px;margin-bottom:10px">${S.visitIcon||'🌟'}</div>
    <div style="font-size:18px;font-weight:800;color:#E8D5A8;margin-bottom:8px">Gracias por su visita, ${S.user.name.split(' ')[0]}!</div>
    <div class="cream-text mb12" style="font-size:13px;line-height:1.7">${gr} hasta pronto!<br/>Fue un placer tenerle en <strong>Le Meridiem Golf</strong>.</div>
    ${S.visitReason?`<span class="badge">Visita: ${S.visitReason}</span>`:''}
  </div>
  <div class="info-box">🔒 El motivo de visita es tratado de forma confidencial con fines estadísticos, conforme a la <span class="gold-text">Política de Datos Personales de Le Meridiem Golf (Ley 1581 de 2012)</span>.</div>
  <div class="warn-box">⏰ Tiene <strong style="color:#E74C3C">15 minutos</strong> para retirar su vehículo.</div>
  <button class="btn-primary mb10" id="btnInvoice">Ver factura digital</button>
  <button class="btn-secondary" id="btnHome">Finalizar</button>
</div></div>`;},

failed(){ return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="card" style="text-align:center">
  <div class="fail-circle">✗</div>
  <div style="font-size:20px;font-weight:800;color:#E74C3C;margin-bottom:8px">Pago no procesado</div>
  <div class="cream-text mb20" style="font-size:13px;line-height:1.6">Disculpe. Su pago no pudo ser procesado en este momento.</div>
  <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;text-align:left;margin-bottom:18px">
    <div style="font-size:13px;color:#E8D5A8;font-weight:700;margin-bottom:10px">¿Qué puede hacer?</div>
    ${[['🔄','Intentar con otro método de pago'],['💵','Módulo de pago en efectivo (Piso 1 o 2)'],['💬','WhatsApp: +57 300 123 4567'],['📞','PBX: (605) 385-0000']].map(([ic,tx])=>`<div style="display:flex;gap:10px;margin-bottom:8px"><span>${ic}</span><span style="font-size:12px;color:#F5F0E6">${tx}</span></div>`).join('')}
  </div>
  <button class="btn-primary mb10" id="btnRetry">Intentar con otro método</button>
  <button class="btn-secondary" id="btnHome">Volver al inicio</button>
</div></div>`;},

invoice(){
  const now=new Date();
  const num=`LM-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Math.floor(Math.random()*9000)+1000}`;
  return `
<div class="screen" style="justify-content:center;min-height:100vh">
<div class="invoice">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div><div style="font-size:15px;font-weight:800;color:#0F2B1E">FACTURA ELECTRÓNICA</div><div style="font-size:11px;color:#6B7E73">${num}</div></div>
    <div class="logo-xs" style="background:#0F2B1E">${logoSVG(38)}</div>
  </div>
  <div class="inv-divider"></div>
  ${[['Cliente',S.user.name],['Placa',S.plate],['Fecha',now.toLocaleDateString('es-CO')],['Hora',now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})]].map(([k,v])=>`<div class="inv-row"><span>${k}:</span><strong>${v}</strong></div>`).join('')}
  <div class="inv-divider"></div>
  <div class="inv-total"><span>TOTAL PAGADO</span><span style="color:#1A6B3C">${fCOP(S.amount)}</span></div>
  <div class="inv-divider"></div>
  <div style="font-size:10px;color:#8A9B93;text-align:center;margin-bottom:16px">Le Meridiem Golf Centro Comercial · NIT: 900.XXX.XXX-X · Barranquilla, Colombia</div>
  <button class="btn-primary" id="btnBack" style="background:#0F2B1E;color:#C9A96E">Cerrar</button>
</div></div>`;}
};

// ── EVENT BINDING ─────────────────────────
function bindEvents(){
  const $ = id => document.getElementById(id);

  // Admin tap zone
  const adminZone = document.createElement('div');
  adminZone.style.cssText='position:fixed;bottom:0;right:0;width:50px;height:50px;z-index:999';
  adminZone.onclick=()=>{
    S.adminTaps++; clearTimeout(S.adminTimer);
    S.adminTimer=setTimeout(()=>S.adminTaps=0,2000);
    if(S.adminTaps>=5){S.adminTaps=0;alert('Módulo admin: use código MER2024');}
  };
  document.getElementById('app').appendChild(adminZone);

  // Back button (common)
  const bk=$('btnBack');
  if(bk) bk.onclick=()=>{
    const prev={register:'plate',welcome:'plate',vehicle:USERS[S.plate]?'welcome':'register',reason:'vehicle',payment:'reason',invoice:'thanks'}[S.screen];
    if(prev)go(prev);
  };

  // ── PLATE SCREEN
  if(S.screen==='plate'){
    const inp=$('plateIn');
    inp.oninput=()=>inp.value=inp.value.toUpperCase();
    $('btnPlate').onclick=()=>{
      const p=inp.value.trim();
      if(p.length<4)return;
      S.plate=p;
      if(USERS[p]){S.user=USERS[p];go('welcome');}
      else{S._regMethod='email';go('register');}
    };
    inp.onkeydown=e=>e.key==='Enter'&&$('btnPlate').click();
  }

  // ── REGISTER SCREEN
  if(S.screen==='register'){
    const validate=()=>{
      const n=$('regName').value.trim();
      const ok=$('chkData').checked;
      const em=$('regEmail')&&$('regEmail').value;
      const ph=$('regPhone')&&$('regPhone').value;
      const valid=n.length>=2&&ok&&(S._regMethod!=='sms'?em&&em.includes('@'):ph&&ph.length>=7);
      $('btnRegister').disabled=!valid;
    };
    $('mEmail').onclick=()=>{S._regMethod='email';go('register');};
    $('mSMS').onclick=()=>{S._regMethod='sms';go('register');};
    $('showPol').onclick=()=>$('polText').classList.toggle('hidden');
    $('chkData').onchange=validate;
    $('regName').oninput=validate;
    if($('regEmail'))$('regEmail').oninput=validate;
    if($('regPhone'))$('regPhone').oninput=validate;
    $('btnRegister').onclick=()=>{
      const name=$('regName').value.trim();
      const email=$('regEmail')?$('regEmail').value:'';
      const phone=$('regPhone')?$('regPhone').value:'';
      const u={name,email,phone,entryMs:Date.now()-1.5*3600000};
      S.user=u; USERS[S.plate]=u; go('vehicle');
    };
  }

  // ── WELCOME SCREEN
  if(S.screen==='welcome'){
    if($('btnContinue'))$('btnContinue').onclick=()=>go('vehicle');
    if($('btnUpdate'))$('btnUpdate').onclick=()=>{S._regMethod='email';go('register');};
  }

  // ── VEHICLE SCREEN
  if(S.screen==='vehicle'){
    $('btnPay').onclick=()=>{
      const info=calcParking(S.user.entryMs||S.user.entryTime);
      S.amount=info.amount; go('reason');
    };
    $('toggleAllies').onclick=()=>{
      $('alliesBody').classList.toggle('hidden');
      $('alliesArrow').textContent=$('alliesBody').classList.contains('hidden')?'▼':'▲';
    };
    $('togglePol').onclick=()=>$('polBody').classList.toggle('hidden');
  }

  // ── REASON SCREEN
  if(S.screen==='reason'){
    let selId=null;
    REASONS.forEach(r=>{
      const btn=$('r_'+r.id);
      if(btn) btn.onclick=()=>{
        REASONS.forEach(x=>{const b=$('r_'+x.id);if(b)b.classList.remove('sel');});
        btn.classList.add('sel'); selId=r.id;
        S.visitReason=r.label; S.visitIcon=r.icon;
        if(r.id==='other')$('otherWrap').classList.remove('hidden');
        else $('otherWrap').classList.add('hidden');
        $('btnReason').disabled=false;
      };
    });
    const otherTxt=$('otherText');
    if(otherTxt) otherTxt.oninput=()=>{ if(otherTxt.value.trim().length>=2){S.visitReason=otherTxt.value.trim();$('btnReason').disabled=false;}else $('btnReason').disabled=true; };
    $('btnReason').onclick=()=>{ if(S.amount===0)go('thanks'); else go('payment'); };
  }

  // ── PAYMENT SCREEN
  if(S.screen==='payment'){
    ['nequi','daviplata','pse','tarjeta'].forEach(m=>{
      const btn=$('m_'+m);
      if(btn) btn.onclick=()=>{S.method=m;go('processing');};
    });
  }

  // ── THANKS & FAILED
  if($('btnHome'))$('btnHome').onclick=()=>{ S.plate='';S.user=null;S.amount=0;S.method='';S.visitReason='';S.visitIcon='';go('plate'); };
  if($('btnRetry'))$('btnRetry').onclick=()=>go('payment');
  if($('btnInvoice'))$('btnInvoice').onclick=()=>go('invoice');
}

// ── INIT ─────────────────────────────────
render();
</script>
</body>
</html>
